name: Nightly Docker Build

on:
  schedule:
    - cron: '0 21 * * *'  # 05:00 UTC+8 daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Test
        run: ./gradlew --no-daemon :noone-server:test

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: noone-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('noone-web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit test
        run: bun run test:run

  publish-images:
    needs: [test-server, test-web]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: noone-web
            context: ./noone-web
            dockerfile: ./noone-web/Dockerfile
          - image: noone-server
            context: .
            dockerfile: ./noone-server/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.image }}:nightly
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:nightly

  upload-deploy-bundle:
    needs: [publish-images]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Package deploy bundle
        run: zip -r noone-nightly-deploy.zip compose.nightly.yml deploy/nginx/default.conf

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: noone-nightly-deploy
          path: noone-nightly-deploy.zip
          retention-days: 7
